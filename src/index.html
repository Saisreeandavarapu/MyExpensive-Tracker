<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Expense Tracker</title>  
</head>

<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black text-white">

<section class="min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-5xl bg-gray-900 rounded-3xl shadow-2xl overflow-hidden flex flex-col lg:flex-row border border-gray-700">

    
    <div class="w-full lg:w-1/2 p-8 md:p-12">

      <div class="flex items-center gap-3 mb-10">
        <h1 class="text-3xl md:text-4xl font-bold text-white">
          Expense Tracker
        </h1>
        <img src="/src/assests/images/image.png" class="w-14 md:w-16">
      </div>

      <div class="mb-8">
        <h2 class="text-2xl md:text-3xl text-gray-300 flex items-center">
          Hello <img src="/src/assests/images/image copy 4.png" class="w-16 md:w-20">
        </h2>
        
        <p class="text-gray-400 mt-2">
          Please enter your name to continue
        </p>
      </div>

      <div class="space-y-5">
        <input
          type="text"
          id="input-name"
          placeholder="Enter your name"
          class="w-full h-12 px-4 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-400 text-lg text-white"
        >

        <button
          class="w-full h-12 bg-gradient-to-r from-cyan-400 to-blue-500 text-black font-semibold rounded-lg hover:scale-105 transition shadow-lg"
          onclick="login()">
          Login
        </button>
      </div>

    </div>

    
    <div class="w-full lg:w-1/2 bg-gradient-to-br from-purple-600 to-blue-500 flex flex-col justify-center items-center text-center p-10">

      <h2 class="text-white text-3xl md:text-4xl font-semibold mb-6">
        Welcome Back!
      </h2>

      <p class="text-blue-100 mb-8 max-w-sm">
        Track your expenses in a smarter and faster way.
      </p>

      <button
        class="px-8 py-3 bg-black text-white rounded-lg shadow-lg hover:bg-transparent hover:border hover:border-white transition"
        onclick="showMessage()">
        Click Here
      </button>

    </div>

  </div>

</section>

<script>
function login(){
let name=document.getElementById("input-name").value;
if(name== "")
{
  alert("please enter your name");
  return;
}
else{
  localStorage.setItem("userName",name);
  window.location.href="home.html";
}
}
function showMessage(){
  alert("Please enter name and login");
}
</script>

</body>
</html>
