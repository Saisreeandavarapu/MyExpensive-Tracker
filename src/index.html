<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white">

<section class="w-full min-h-screen flex flex-col lg:flex-row">

  
  <div class="w-full lg:w-[60%] flex flex-col justify-center px-6 md:px-16 py-10">

    <div class="flex items-center gap-3">
      <h1 class="text-3xl md:text-4xl lg:text-5xl tracking-wide">
        Expense Tracker
      </h1>
      <img src="/src/assests/image.png" class="w-16 md:w-20 lg:w-24">
    </div>

    <div class="mt-16 md:mt-24">

      <div class="flex flex-wrap items-center gap-3">
        <h1 class="text-3xl md:text-4xl lg:text-5xl tracking-wide">Hello</h1>

        <img src="/src/assests/image copy.png" class="w-16 md:w-20">

        <h1 class="text-3xl md:text-4xl lg:text-5xl tracking-wide">
          please enter your
        </h1>
      </div>

      <h1 class="text-5xl md:text-6xl lg:text-8xl text-blue-500 tracking-wider mt-2">
        Name
      </h1>

      <div class="mt-6 space-y-3">

        <input
          type="text"
          id="input-name"
          placeholder="Name Here"
          class="w-full max-w-xs h-12 border-2 px-5 rounded-md shadow-lg focus:outline-none focus:border-blue-500 text-xl"
        >

        <br>

        <button
          class="w-32 h-12 bg-blue-500 rounded-md text-white text-lg hover:bg-blue-600 transition">
          Login
        </button>

      </div>

    </div>

  </div>


  
  <div class="w-full lg:w-[40%] bg-blue-500 flex justify-center lg:justify-end items-start rounded-none lg:rounded-bl-[40%]">

    <button
      class="w-40 h-14 bg-white text-xl md:text-2xl rounded-md text-blue-500 tracking-wider m-10 lg:mt-20 lg:me-20 shadow-xl hover:border-2 hover:border-white hover:bg-transparent hover:text-white transition">

      Click Here

    </button>

  </div>

</section>

</body>
</html>
