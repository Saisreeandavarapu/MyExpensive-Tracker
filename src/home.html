<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black text-white">

<!-- Header -->
<header class="w-full h-24 bg-gradient-to-r from-purple-600 to-blue-500 flex items-center justify-between px-6 md:px-10 shadow-lg">
    
    <div class="flex items-center gap-2">
        <h1 class="text-2xl md:text-4xl tracking-wider leading-tight font-bold">
            Expense <br class="hidden md:block">Tracker
        </h1>
        <img src="/src/assests/images/image.png" class="w-8 h-8 md:w-10 md:h-10 mt-6">
    </div>

    <h1 class="text-white text-2xl md:text-3xl">
        Hi, <span id="displayName" class="text-cyan-300"></span>
    </h1>
</header>

<!-- Input Section -->
<section class="max-w-6xl mx-auto mt-10 rounded-xl p-6 bg-gray-900/70 backdrop-blur-md border border-gray-700 shadow-xl">

    <div class="flex flex-col md:flex-row gap-5 md:gap-10 items-center justify-center">

        <input type="text" placeholder="Amount"
        id="input-amount"
        class="bg-gray-800 border border-gray-700 h-12 md:h-14 px-5 rounded-lg text-lg w-full md:w-auto focus:ring-2 focus:ring-cyan-400 outline-none">

        <select id="transactiontype"
        class="bg-gray-800 border border-gray-700 h-12 md:h-14 px-5 rounded-lg text-lg w-full md:w-auto text-gray-300 focus:ring-2 focus:ring-cyan-400 outline-none">
            <option value="Type" selected>Transaction Type</option>
            <option value="Income">Income</option>
            <option value="Expense">Expense</option>
        </select>

        <input type="date"
        id="input-date"
        class="bg-gray-800 border border-gray-700 h-12 md:h-14 px-5 rounded-lg w-full md:w-auto text-gray-300 focus:ring-2 focus:ring-cyan-400 outline-none">

        <button class="w-12 h-12 bg-gradient-to-r from-cyan-400 to-blue-500 rounded-full text-black font-bold text-xl hover:scale-110 transition"
        onclick="addRow()">
            +
        </button>

    </div>
</section>

<!-- Cards Section -->
<section class="max-w-6xl mx-auto mt-10 px-4">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

        <div class="h-32 bg-gradient-to-r from-green-400 to-emerald-600 rounded-xl text-center shadow-lg">
            <h1 class="text-white text-2xl pt-4">Total Income</h1>
            <h1 class="text-white text-3xl">$ <span id="income-value">0</span></h1>
        </div>

        <div class="h-32 bg-gradient-to-r from-red-400 to-pink-600 rounded-xl text-center shadow-lg">
            <h1 class="text-white text-2xl pt-4">Total Expense</h1>
            <h1 class="text-white text-3xl">$ <span id="expense-value">0</span></h1>
        </div>

        <div class="h-32 bg-gradient-to-r from-cyan-400 to-blue-600 rounded-xl text-center shadow-lg">
            <h1 class="text-white text-2xl pt-4">Balance</h1>
            <h1 class="text-white text-3xl">$ <span id="balance-value">0</span></h1>
        </div>

    </div>
</section>

<!-- Table Section -->
<section class="max-w-6xl mx-auto mt-10 px-4">
    <div class="overflow-x-auto rounded-xl border border-gray-700">

        <table class="w-full border-collapse" id="tabledata">

            <thead>
                <tr class="bg-gradient-to-r from-purple-600 to-blue-500 text-white text-lg">
                    <th class="px-4 py-3">Amount</th>
                    <th class="px-4">Transaction Type</th>
                    <th class="px-4">Transaction Date</th>
                    <th class="px-4">Action</th>
                </tr>
            </thead>

            <tbody id="tablebody" class="text-gray-300 text-center">
            </tbody>

        </table>

    </div>
</section>

<!-- Script -->
<script>
let name = localStorage.getItem("userName");
document.getElementById("displayName").innerHTML = name;

let table = document.getElementById("tablebody");
let Transactions = JSON.parse(localStorage.getItem("Transactions")) || [];

function saveToLocalStorage() {
    localStorage.setItem("Transactions", JSON.stringify(Transactions));
}

function deleteRow(row, index) {
    row.remove();
    Transactions.splice(index, 1);
    saveToLocalStorage();
}

window.onload = function() {
    // Load saved totals
    let savedIncome = localStorage.getItem("income");
    let savedExpense = localStorage.getItem("expense");
    let savedBalance = localStorage.getItem("balance");

    if (savedIncome) document.getElementById("income-value").innerHTML = savedIncome;
    if (savedExpense) document.getElementById("expense-value").innerHTML = savedExpense;
    if (savedBalance) document.getElementById("balance-value").innerHTML = savedBalance;

    // Load saved transactions
    Transactions.forEach(function(item, index) {
        let row = document.createElement("tr");
        row.classList.add("h-14","text-gray-300","text-lg","text-center");

        let amountcell = document.createElement("td");
        amountcell.innerHTML = item.amount;

        let transactioncell = document.createElement("td");
        transactioncell.innerHTML = item.Transaction;

        let transactiondatecell = document.createElement("td");
        transactiondatecell.innerHTML = item.date;

        let bincell = document.createElement("td");
        let binImage = document.createElement("img");
        binImage.src = "/src/assests/images/image copy 3.png";
        binImage.classList.add("w-8","h-8","mx-auto","cursor-pointer");
        binImage.onclick = () => deleteRow(row, index);

        bincell.appendChild(binImage);

        row.appendChild(amountcell);
        row.appendChild(transactioncell);
        row.appendChild(transactiondatecell);
        row.appendChild(bincell);

        table.appendChild(row);
    })
}

function addRow() {
    // Save totals before adding new row
    localStorage.setItem("income", document.getElementById("income-value").innerText);
    localStorage.setItem("expense", document.getElementById("expense-value").innerText);
    localStorage.setItem("balance", document.getElementById("balance-value").innerText);

    let date = document.getElementById("input-date").value;
    let amount = document.getElementById("input-amount").value;
    let Transaction = document.getElementById("transactiontype").value;

    if (date == "" || amount == "" || Transaction == "Type") {
        alert("Please Enter the data");
        return;
    }

    let data = { amount: amount, date: date, Transaction: Transaction };
    Transactions.push(data);
    saveToLocalStorage();

    let row = document.createElement("tr");
    row.classList.add("h-14","text-gray-300","text-lg","text-center");

    let amountcell = document.createElement("td");
    amountcell.innerHTML = amount;

    let transactioncell = document.createElement("td");
    transactioncell.innerHTML = Transaction;

    let transactiondatecell = document.createElement("td");
    transactiondatecell.innerHTML = date;

    let bincell = document.createElement("td");
    let binImage = document.createElement("img");
    binImage.src = "/src/assests/images/image copy 3.png";
    binImage.classList.add("w-8","h-8","mx-auto","cursor-pointer");
    let index = Transactions.length - 1;
    binImage.onclick = () => deleteRow(row, index);

    bincell.appendChild(binImage);

    row.appendChild(amountcell);
    row.appendChild(transactioncell);
    row.appendChild(transactiondatecell);
    row.appendChild(bincell);

    table.appendChild(row);

    let totalIncome = document.getElementById("income-value").innerText;
    let totalExpense = document.getElementById("expense-value").innerText;
    let balanceAmount = document.getElementById("balance-value").innerText;

    if (Transaction == "Income") {
        document.getElementById("income-value").innerHTML = (parseInt(totalIncome) || 0) + parseInt(amount);
        document.getElementById("balance-value").innerHTML = (parseInt(balanceAmount) || 0) + parseInt(amount);
    } else {
        document.getElementById("expense-value").innerHTML = (parseInt(totalExpense) || 0) + parseInt(amount);
        document.getElementById("balance-value").innerHTML = (parseInt(balanceAmount) || 0) - parseInt(amount);
    }
}
</script>

</body>
</html>
