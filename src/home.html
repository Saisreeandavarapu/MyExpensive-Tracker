<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

<header class="w-full h-24 bg-blue-500 flex items-center justify-between  px-6 md:px-10">
    <div class="flex items-center">
    <h1 class="text-2xl md:text-4xl text-white tracking-wider leading-tight">
        Expense <br class="hidden md:block">Tracker
    </h1>
    <img src="/src/assests/images/image.png" class="w-8 h-8 md:w-10 md:h-10 mt-10"></div>

    <h1  class="text-white text-4xl tracking wider">Hi. <span id="displayName"></span></h1>
</header>


<section class="max-w-6xl mx-auto border mt-10 rounded-md p-6">
    <div class="flex flex-col md:flex-row gap-5 md:gap-10 items-center justify-center">

        <input type="text" placeholder="Amount"
        id="input-amount"
        class="border-2 h-12 md:h-14 px-5 rounded-md text-lg md:text-xl w-full md:w-auto" >

        <select name="" id="transactiontype" class="border-2 h-12 md:h-14 px-5 rounded-md text-lg md:text-xl w-full md:w-auto text-gray-400" >
            <option value="Type"  selected>Transaction Type</option>
            <option value="Income">Income</option>
            <option value="Expense">Expense </option>
        </select>
        

        <input type="date"
        id="input-date"
        class="border-2 h-12 md:h-14 px-5 rounded-md w-full md:w-auto text-gray-500" >

        <button class="w-10 h-10 bg-blue-500 rounded-full text-white font-bold text-xl pb-1" onclick="addRow()">
            +
        </button>

    </div>
</section>


<section class="max-w-6xl mx-auto mt-10 px-4">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

        <div class="h-32 bg-blue-500 rounded-md text-center">
            <div class="flex justify-center items-center gap-2">
                <h1 class="text-white text-2xl md:text-3xl tracking-wide pt-4">Total Income</h1>
                <img src="/src/assests/images/image copy 2.png" class="w-8 h-8 md:w-10 md:h-10 mt-4">
            </div>
            <h1 class="text-white text-3xl md:text-4xl tracking-wide">
                $ <span id="income-value">0</span>
            </h1>
        </div>

        <div class="h-32 bg-blue-500 rounded-md text-center">
            <div class="flex justify-center items-center gap-2">
                <h1 class="text-white text-2xl md:text-3xl tracking-wide pt-4">Total Expense</h1>
                <img src="/src/assests/images/image copy 2.png" class="w-8 h-8 md:w-10 md:h-10 mt-4">
            </div>
            <h1 class="text-white text-3xl md:text-4xl tracking-wide">
                $ <span id="expense-value">0</span>
            </h1>
        </div>

        <div class="h-32 bg-blue-500 rounded-md text-center">
            <div class="flex justify-center items-center gap-2">
                <h1 class="text-white text-2xl md:text-3xl tracking-wide pt-4">Balance</h1>
                <img src="/src/assests/images/image copy 2.png" class="w-8 h-8 md:w-10 md:h-10 mt-4">
            </div>
            <h1 class="text-white text-3xl md:text-4xl tracking-wide">
                $ <span id="balance-value">0</span>
            </h1>
        </div>

    </div>
</section>


<section class="max-w-6xl mx-auto mt-10 px-4">
    <div class="overflow-x-auto">

        <table class="w-full border-collapse" id="tabledata">

            <thead>
                <tr class="bg-blue-500 h-14 text-white text-lg md:text-xl tracking-wide">
                    <th class="px-4">Amount</th>
                    <th class="px-4">Transaction Type</th>
                    <th class="px-4">Transaction Date</th>
                    <th class="px-4">Action</th>
                </tr>
            </thead>

            <tbody id="tablebody">
               
            </tbody>

        </table>

    </div>
</section>
<script>
    let name=localStorage.getItem("userName");
    document.getElementById("displayName").innerHTML=name;
let table=document.getElementById("tablebody");
let Transactions=JSON.parse(localStorage.getItem("Transactions"))||[];

function saveToLocalStorage(){
    localStorage.setItem("Transactions",JSON.stringify(Transactions));
}

function deleteRow(row,index){
    row.remove();
    Transactions.splice(index,1);
    saveToLocalStorage();
}
/* “Run this code after the HTML page, images, CSS, and scripts are fully loaded.”

So the browser first loads the entire page, then executes the code inside onload.

If you don't use it:

Page refresh → table becomes empty

Even though data exists in LocalStorage

Because the browser does not automatically display stored data.

You must manually load it using JavaScript.
*/

window.onload=function(){

    Transactions.forEach(function(item,index){

        let row=document.createElement("tr");
        row.classList.add(
        "h-14",
        "text-blue-500",
        "text-lg",
        "md:text-xl",
        "tracking-wide",
        "text-center",
        );

        let amountcell=document.createElement("td");
        amountcell.innerHTML=item.amount;

        let transactioncell=document.createElement("td");
        transactioncell.innerHTML=item.Transaction;

        let transactiondatecell=document.createElement("td");
        transactiondatecell.innerHTML=item.date;

        let bincell=document.createElement("td");

        let binImage=document.createElement("img");
        binImage.src="/src/assests/images/image copy 3.png";
        binImage.classList.add("w-10","h-10");
        binImage.onclick=()=>deleteRow(row,index);

        bincell.appendChild(binImage);

        row.appendChild(amountcell);
        row.appendChild(transactioncell);
        row.appendChild(transactiondatecell);
        row.appendChild(bincell);

        table.appendChild(row);
    })

}

function addRow()
{
    
    let date=document.getElementById("input-date").value;
    let amount=document.getElementById("input-amount").value;
    let Transaction=document.getElementById("transactiontype").value;
   
    if(date == "" || amount == "" || Transaction == "Type")
    {
        alert("Please Enter the data");
        return;
    }

    let data={
        amount:amount,
        date:date,
        Transaction:Transaction
    };

    Transactions.push(data);
    saveToLocalStorage();

    let row=document.createElement("tr");
    row.classList.add(
"h-14",
"text-blue-500",
"text-lg",
"md:text-xl",
"tracking-wide",
"text-center",
);

    let amountcell=document.createElement("td");
    amountcell.innerHTML=amount;

    let transactioncell=document.createElement("td");
    transactioncell.innerHTML=Transaction;

    let transactiondatecell=document.createElement("td");
    transactiondatecell.innerHTML=date;

    let bincell=document.createElement("td");
    
    let binImage=document.createElement("img");
    binImage.src="/src/assests/images/image copy 3.png";
    binImage.classList.add("w-10","h-10");

    let index=Transactions.length-1;
    binImage.onclick=()=>deleteRow(row,index);

    bincell.appendChild(binImage);

    row.appendChild(amountcell);
    row.appendChild(transactioncell);
    row.appendChild(transactiondatecell);
    row.appendChild(bincell);

    table.appendChild(row);
    
    let totalIncome=document.getElementById("income-value").innerText;
    let totalExpense=document.getElementById("expense-value").innerText;
    let balanceAmount=document.getElementById("balance-value").innerText;

    if(Transaction == "Income")
    {
       if(totalIncome == "0")
       {
        document.getElementById("income-value").innerHTML=amount;
       }
       else
       {
        document.getElementById("income-value").innerHTML=parseInt(totalIncome)+parseInt(amount);
       }
       
       if(balanceAmount == "0")
       {
        document.getElementById("balance-value").innerHTML=amount;
       }
       else{
        document.getElementById("balance-value").innerHTML=parseInt(balanceAmount)+parseInt(amount);
       }
       
    }
    else 
    {
      if(totalExpense == "0")
      {
        document.getElementById("expense-value").innerHTML=amount;
      }
      else{
        document.getElementById("expense-value").innerHTML=parseInt(totalExpense)+parseInt(amount);
      }

      if(balanceAmount == "0")
       {
        document.getElementById("balance-value").innerHTML=amount;
       }
       else{
        document.getElementById("balance-value").innerHTML=parseInt(balanceAmount)-parseInt(amount);
       }
       
    }
}


</script>
</body>
</html>
